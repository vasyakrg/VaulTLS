{{- if .Values.backup.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-backup" (include "vaultls.fullname" .) }}
  labels:
    {{- include "vaultls.labels" . | nindent 4 }}
data:
  # Sidecar entrypoint: installs tooling once, registers the cron schedule and
  # runs busybox crond in the foreground. crond is PID 1 in this container, so
  # job output redirected to /proc/1/fd/{1,2} surfaces in `kubectl logs ... -c backup`.
  entrypoint.sh: |
    #!/bin/sh
    set -eu

    echo "==> backup sidecar starting"
    echo "==> installing restic + sqlcipher"
    # sqlcipher CLI reads the SQLCipher-encrypted DB; sqlite provides sqlite3 for the plaintext fallback.
    apk add --no-cache restic sqlcipher sqlite tzdata >/dev/null

    mkdir -p /run/backup

    # crond runs jobs with a minimal environment, so persist the backup env for backup.sh to source.
    # VAULTLS_DB_SECRET is included so backup.sh can unlock the encrypted database.
    printenv | grep -E '^(S3_|AWS_|RESTIC_|KEEP_|VAULTLS_DB_SECRET)' \
      | sed 's/^\([^=]*\)=\(.*\)$/export \1="\2"/' > /run/backup/backup.env

    mkdir -p /etc/crontabs
    echo "${BACKUP_SCHEDULE} /bin/sh /scripts/backup.sh >/proc/1/fd/1 2>/proc/1/fd/2" > /etc/crontabs/root

    echo "==> schedule: ${BACKUP_SCHEDULE} (TZ=${TZ:-UTC})"
    {{- if .Values.backup.runOnStart }}
    echo "==> running an initial backup on startup"
    /bin/sh /scripts/backup.sh || echo "    initial backup failed (continuing into schedule)"
    {{- end }}

    exec crond -f -l 8

  backup.sh: |
    #!/bin/sh
    set -eu

    [ -f /run/backup/backup.env ] && . /run/backup/backup.env

    DATA_DIR="{{ .Values.persistence.mountPath }}"
    WORK="/run/backup"
    STAGE="$WORK/stage"
    LOCK="$WORK/backup.lock"

    # Atomic lock (mkdir) to skip overlapping runs without depending on flock.
    if ! mkdir "$LOCK" 2>/dev/null; then
      echo "==> another backup run is in progress, skipping"
      exit 0
    fi
    trap 'rm -rf "$LOCK"' EXIT

    echo "==> backup started: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

    rm -rf "$STAGE"
    mkdir -p "$STAGE"

    echo "==> creating consistent SQLite snapshots"
    found_db=0
    for db in $(find "$DATA_DIR" -type f \( -name '*.db' -o -name '*.db3' -o -name '*.sqlite' -o -name '*.sqlite3' \) 2>/dev/null); do
      found_db=1
      rel="${db#$DATA_DIR/}"
      dest="$STAGE/$rel"
      mkdir -p "$(dirname "$dest")"
      if [ -n "${VAULTLS_DB_SECRET:-}" ]; then
        # SQLCipher-encrypted DB. The CLI .backup dot-command is rejected for encrypted DBs, so we
        # take a consistent snapshot with sqlcipher_export() into a fresh encrypted copy (same key) —
        # the same mechanism VaulTLS itself uses. SQL is piped via the printf builtin (not argv), so
        # the key never appears in `ps`. .bail on makes a bad key / any error exit non-zero.
        # cipher_compatibility=4 pins SQLCipher 4 defaults (rusqlite bundles v4), independent of how
        # the alpine sqlcipher package was compiled, so the snapshot restores cleanly into VaulTLS.
        # Escape single quotes for the SQL string literals.
        echo "    sqlcipher_export: $rel"
        esc_key=$(printf '%s' "$VAULTLS_DB_SECRET" | sed "s/'/''/g")
        # sqlcipher_export() does NOT carry over PRAGMA user_version (it lives in the DB header, not a
        # table), so we read it from the source and re-apply it to the snapshot — otherwise VaulTLS'
        # migration runner sees version 0 and re-runs every migration on an already-migrated schema
        # ("duplicate column name"). This mirrors what VaulTLS itself does in db.rs after export.
        db_uv=$(printf ".bail on\nPRAGMA key = '%s';\nPRAGMA cipher_compatibility = 4;\nPRAGMA user_version;\n" "$esc_key" | sqlcipher "$db" | tr -cd '0-9')
        db_uv="${db_uv:-0}"
        # cipher_compatibility=4 reads the existing (v4) main DB; cipher_default_compatibility=4 must be
        # set BEFORE ATTACH so the new snapshot is also written in v4 format — a schema-prefixed
        # "PRAGMA bk.cipher_compatibility" does not affect a freshly attached DB and would produce a
        # snapshot in the alpine build's default format that VaulTLS' bundled SQLCipher cannot decrypt.
        printf ".bail on\nPRAGMA key = '%s';\nPRAGMA cipher_compatibility = 4;\nPRAGMA cipher_default_compatibility = 4;\nATTACH DATABASE '%s' AS bk KEY '%s';\nSELECT sqlcipher_export('bk');\nPRAGMA bk.user_version = %s;\nDETACH DATABASE bk;\n" "$esc_key" "$dest" "$esc_key" "$db_uv" | sqlcipher "$db"
      else
        echo "    sqlite .backup: $rel"
        sqlite3 "$db" ".backup '$dest'"
      fi
    done
    [ "$found_db" -eq 0 ] && echo "    no SQLite database found, archiving files only"

    echo "==> staging remaining files (certs, keys, crl, ...)"
    tar -C "$DATA_DIR" \
      --exclude='*.db' --exclude='*.db-wal' --exclude='*.db-shm' --exclude='*.db-journal' \
      --exclude='*.db3' --exclude='*.db3-wal' --exclude='*.db3-shm' --exclude='*.db3-journal' \
      --exclude='*.sqlite' --exclude='*.sqlite3' \
      -cf - . | tar -C "$STAGE" -xf -

    export RESTIC_REPOSITORY="s3:${S3_ENDPOINT}/${S3_BUCKET}/${S3_PATH}"

    echo "==> ensuring restic repository exists"
    if ! restic snapshots >/dev/null 2>&1; then
      echo "    initializing repository at ${RESTIC_REPOSITORY}"
      restic init
    fi

    echo "==> backing up"
    restic backup --host vaultls --tag vaultls "$STAGE"

    echo "==> applying retention policy"
    restic forget --host vaultls --tag vaultls \
      --keep-daily "$KEEP_DAILY" \
      --keep-weekly "$KEEP_WEEKLY" \
      --keep-monthly "$KEEP_MONTHLY" \
      --prune

    echo "==> current snapshots"
    restic snapshots --host vaultls
    echo "==> backup completed: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
{{- end }}
