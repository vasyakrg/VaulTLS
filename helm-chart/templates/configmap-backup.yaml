{{- if .Values.backup.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-backup" (include "vaultls.fullname" .) }}
  labels:
    {{- include "vaultls.labels" . | nindent 4 }}
data:
  # Sidecar entrypoint: installs tooling once, registers the cron schedule and
  # runs busybox crond in the foreground. crond is PID 1 in this container, so
  # job output redirected to /proc/1/fd/{1,2} surfaces in `kubectl logs ... -c backup`.
  entrypoint.sh: |
    #!/bin/sh
    set -eu

    echo "==> backup sidecar starting"
    echo "==> installing restic + sqlite"
    apk add --no-cache restic sqlite tzdata >/dev/null

    mkdir -p /run/backup

    # crond runs jobs with a minimal environment, so persist the backup env for backup.sh to source.
    printenv | grep -E '^(S3_|AWS_|RESTIC_|KEEP_)' \
      | sed 's/^\([^=]*\)=\(.*\)$/export \1="\2"/' > /run/backup/backup.env

    mkdir -p /etc/crontabs
    echo "${BACKUP_SCHEDULE} /bin/sh /scripts/backup.sh >/proc/1/fd/1 2>/proc/1/fd/2" > /etc/crontabs/root

    echo "==> schedule: ${BACKUP_SCHEDULE} (TZ=${TZ:-UTC})"
    {{- if .Values.backup.runOnStart }}
    echo "==> running an initial backup on startup"
    /bin/sh /scripts/backup.sh || echo "    initial backup failed (continuing into schedule)"
    {{- end }}

    exec crond -f -l 8

  backup.sh: |
    #!/bin/sh
    set -eu

    [ -f /run/backup/backup.env ] && . /run/backup/backup.env

    DATA_DIR="{{ .Values.persistence.mountPath }}"
    WORK="/run/backup"
    STAGE="$WORK/stage"
    LOCK="$WORK/backup.lock"

    # Atomic lock (mkdir) to skip overlapping runs without depending on flock.
    if ! mkdir "$LOCK" 2>/dev/null; then
      echo "==> another backup run is in progress, skipping"
      exit 0
    fi
    trap 'rm -rf "$LOCK"' EXIT

    echo "==> backup started: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

    rm -rf "$STAGE"
    mkdir -p "$STAGE"

    echo "==> creating consistent SQLite snapshots"
    found_db=0
    for db in $(find "$DATA_DIR" -type f \( -name '*.db' -o -name '*.sqlite' -o -name '*.sqlite3' \) 2>/dev/null); do
      found_db=1
      rel="${db#$DATA_DIR/}"
      dest="$STAGE/$rel"
      mkdir -p "$(dirname "$dest")"
      echo "    sqlite .backup: $rel"
      sqlite3 "$db" ".backup '$dest'"
    done
    [ "$found_db" -eq 0 ] && echo "    no SQLite database found, archiving files only"

    echo "==> staging remaining files (certs, keys, crl, ...)"
    tar -C "$DATA_DIR" \
      --exclude='*.db' --exclude='*.db-wal' --exclude='*.db-shm' --exclude='*.db-journal' \
      --exclude='*.sqlite' --exclude='*.sqlite3' \
      -cf - . | tar -C "$STAGE" -xf -

    export RESTIC_REPOSITORY="s3:${S3_ENDPOINT}/${S3_BUCKET}/${S3_PATH}"

    echo "==> ensuring restic repository exists"
    if ! restic snapshots >/dev/null 2>&1; then
      echo "    initializing repository at ${RESTIC_REPOSITORY}"
      restic init
    fi

    echo "==> backing up"
    restic backup --host vaultls --tag vaultls "$STAGE"

    echo "==> applying retention policy"
    restic forget --host vaultls --tag vaultls \
      --keep-daily "$KEEP_DAILY" \
      --keep-weekly "$KEEP_WEEKLY" \
      --keep-monthly "$KEEP_MONTHLY" \
      --prune

    echo "==> current snapshots"
    restic snapshots --host vaultls
    echo "==> backup completed: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
{{- end }}
