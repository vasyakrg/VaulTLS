{{- if not .Values.secrets.existingSecret }}
{{- if not .Values.secrets.apiSecret }}
{{- fail "secrets.apiSecret is required (VAULTLS_API_SECRET). Generate with: openssl rand -base64 32" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vaultls.fullname" . }}
  labels:
    {{- include "vaultls.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-secret: {{ .Values.secrets.apiSecret | quote }}
  {{- with .Values.secrets.dbSecret }}
  db-secret: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.oidcClientId }}
  oidc-client-id: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.oidcClientSecret }}
  oidc-client-secret: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.accountEmail }}
  account-email: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.accountPassword }}
  account-password: {{ . | quote }}
  {{- end }}
{{- end }}
