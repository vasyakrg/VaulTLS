{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-backup" (include "vaultls.fullname" .) }}
  labels:
    {{- include "vaultls.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: {{ .Values.backup.concurrencyPolicy }}
  startingDeadlineSeconds: {{ .Values.backup.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ .Values.backup.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.backup.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "vaultls.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: Never
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and .Values.backup.pinToAppNode (eq .Values.persistence.accessMode "ReadWriteOnce") }}
          affinity:
            podAffinity:
              # Pin to the same node as the app pod so the RWO volume mounts to both.
              requiredDuringSchedulingIgnoredDuringExecution:
                - topologyKey: kubernetes.io/hostname
                  labelSelector:
                    matchLabels:
                      {{- include "vaultls.selectorLabels" . | nindent 22 }}
          {{- end }}
          containers:
            - name: backup
              image: "{{ .Values.backup.image.repository }}:{{ .Values.backup.image.tag }}"
              imagePullPolicy: {{ .Values.backup.image.pullPolicy }}
              command: ["/bin/sh", "/scripts/backup.sh"]
              env:
                - name: S3_ENDPOINT
                  value: {{ .Values.backup.restic.s3Endpoint | quote }}
                - name: S3_BUCKET
                  value: {{ .Values.backup.restic.s3Bucket | quote }}
                - name: S3_PATH
                  value: {{ .Values.backup.restic.s3Path | quote }}
                {{- with .Values.backup.restic.s3Region }}
                - name: AWS_DEFAULT_REGION
                  value: {{ . | quote }}
                {{- end }}
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "vaultls.backupSecretName" . }}
                      key: s3-access-key-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "vaultls.backupSecretName" . }}
                      key: s3-secret-access-key
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "vaultls.backupSecretName" . }}
                      key: restic-password
                - name: KEEP_DAILY
                  value: {{ .Values.backup.restic.keepDaily | quote }}
                - name: KEEP_WEEKLY
                  value: {{ .Values.backup.restic.keepWeekly | quote }}
                - name: KEEP_MONTHLY
                  value: {{ .Values.backup.restic.keepMonthly | quote }}
              volumeMounts:
                - name: data
                  mountPath: {{ .Values.persistence.mountPath }}
                  readOnly: false
                - name: scripts
                  mountPath: /scripts
                - name: stage
                  mountPath: /stage
              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: {{ include "vaultls.pvcName" . }}
            - name: scripts
              configMap:
                name: {{ printf "%s-backup" (include "vaultls.fullname" .) }}
            - name: stage
              emptyDir: {}
{{- end }}
