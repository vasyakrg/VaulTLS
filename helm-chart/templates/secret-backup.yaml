{{- if and .Values.backup.enabled (not .Values.backup.restic.existingSecret) }}
{{- if not .Values.backup.restic.password }}
{{- fail "backup.restic.password is required (restic encryption). Generate with: openssl rand -base64 24" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-backup" (include "vaultls.fullname" .) }}
  labels:
    {{- include "vaultls.labels" . | nindent 4 }}
type: Opaque
stringData:
  restic-password: {{ .Values.backup.restic.password | quote }}
  s3-access-key-id: {{ .Values.backup.restic.accessKeyId | quote }}
  s3-secret-access-key: {{ .Values.backup.restic.secretAccessKey | quote }}
{{- end }}
