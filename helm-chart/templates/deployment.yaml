apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vaultls.fullname" . }}
  labels:
    {{- include "vaultls.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    # RWO volume + SQLite: never run two writers at once.
    type: Recreate
  selector:
    matchLabels:
      {{- include "vaultls.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vaultls.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- if .Values.backup.enabled }}
        checksum/backup-config: {{ include (print $.Template.BasePath "/configmap-backup.yaml") . | sha256sum }}
        checksum/backup-secret: {{ include (print $.Template.BasePath "/secret-backup.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.config.metrics.scrapeAnnotations.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "80"
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vaultls
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: VAULTLS_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaultls.secretName" . }}
                  key: api-secret
            - name: VAULTLS_URL
              value: {{ .Values.config.url | quote }}
            - name: VAULTLS_INSECURE
              value: {{ .Values.config.insecure | quote }}
            - name: VAULTLS_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            {{- if .Values.secrets.dbSecret }}
            - name: VAULTLS_DB_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaultls.secretName" . }}
                  key: db-secret
            {{- end }}
            {{- if .Values.config.oidc.authUrl }}
            - name: VAULTLS_OIDC_AUTH_URL
              value: {{ .Values.config.oidc.authUrl | quote }}
            - name: VAULTLS_OIDC_CALLBACK_URL
              value: {{ .Values.config.oidc.callbackUrl | quote }}
            - name: VAULTLS_OIDC_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaultls.secretName" . }}
                  key: oidc-client-id
            - name: VAULTLS_OIDC_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaultls.secretName" . }}
                  key: oidc-client-secret
            {{- end }}
            {{- if .Values.config.acme.enabled }}
            - name: VAULTLS_ACME_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.config.acme.accountEmail }}
            - name: VAULTLS_ACCOUNT_EMAIL
              value: {{ .Values.config.acme.accountEmail | quote }}
            {{- end }}
            {{- if .Values.config.acme.dnsResolver }}
            - name: VAULTLS_ACME_DNS_RESOLVER
              value: {{ .Values.config.acme.dnsResolver | quote }}
            {{- end }}
            {{- if .Values.secrets.accountPassword }}
            - name: VAULTLS_ACCOUNT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaultls.secretName" . }}
                  key: account-password
            {{- end }}
            {{- if .Values.secrets.metricsToken }}
            - name: VAULTLS_METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaultls.secretName" . }}
                  key: metrics-token
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.backup.enabled }}
        # Backup sidecar: shares the same PVC mount within this pod, so RWO volumes
        # never need a second attachment (a standalone CronJob cannot mount RWO here).
        - name: backup
          image: "{{ .Values.backup.image.repository }}:{{ .Values.backup.image.tag }}"
          imagePullPolicy: {{ .Values.backup.image.pullPolicy }}
          command: ["/bin/sh", "/scripts/entrypoint.sh"]
          env:
            - name: BACKUP_SCHEDULE
              value: {{ .Values.backup.schedule | quote }}
            {{- with .Values.backup.timezone }}
            - name: TZ
              value: {{ . | quote }}
            {{- end }}
            - name: S3_ENDPOINT
              value: {{ .Values.backup.restic.s3Endpoint | quote }}
            - name: S3_BUCKET
              value: {{ .Values.backup.restic.s3Bucket | quote }}
            - name: S3_PATH
              value: {{ .Values.backup.restic.s3Path | quote }}
            {{- with .Values.backup.restic.s3Region }}
            - name: AWS_DEFAULT_REGION
              value: {{ . | quote }}
            {{- end }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaultls.backupSecretName" . }}
                  key: s3-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaultls.backupSecretName" . }}
                  key: s3-secret-access-key
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaultls.backupSecretName" . }}
                  key: restic-password
            - name: KEEP_DAILY
              value: {{ .Values.backup.restic.keepDaily | quote }}
            - name: KEEP_WEEKLY
              value: {{ .Values.backup.restic.keepWeekly | quote }}
            - name: KEEP_MONTHLY
              value: {{ .Values.backup.restic.keepMonthly | quote }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            - name: backup-scripts
              mountPath: /scripts
            - name: backup-work
              mountPath: /run/backup
          resources:
            {{- toYaml .Values.backup.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "vaultls.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.backup.enabled }}
        - name: backup-scripts
          configMap:
            name: {{ printf "%s-backup" (include "vaultls.fullname" .) }}
        - name: backup-work
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
