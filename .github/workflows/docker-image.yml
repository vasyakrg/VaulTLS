name: Build and Push Container Image

on:
  # Auto-build the image on every push to main (tested locally beforehand).
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Manual tag name (e.g. v1.0.0)'
        required: true
        default: 'manual'

jobs:
  build:
    runs-on: [self-hosted, X64]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        run: |
          REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          REPO="ghcr.io/${REPO_LOWER}"

          case "${{ github.event_name }}" in
            push)
              # Push to main publishes the rolling latest image (plus :dev).
              TAGS="${REPO}:latest,${REPO}:dev"
              ;;
            workflow_dispatch)
              TAGS="${REPO}:${{ github.event.inputs.tag_name }},${REPO}:rc"
              ;;
            *)
              # Release: tag with the release name plus the rc channel.
              # :latest is published only from main, never from releases.
              TAG_NAME="${GITHUB_REF##*/}"
              TAGS="${REPO}:${TAG_NAME},${REPO}:rc"
              ;;
          esac

          echo "TAGS=$TAGS" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          file: ./Containerfile
          push: true
          tags: ${{ env.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
