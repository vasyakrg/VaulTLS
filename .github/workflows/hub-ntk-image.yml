name: Build and Push to hub.ntk

# Сборка форк-образа во внутренний registry hub.ntk.novotelecom.ru.
# Оригинальный docker-image.yml (ghcr.io) не трогаем — этот workflow независим.
#
# Требуются secrets репозитория:
#   HUB_NTK_REGISTRY  — хост registry (напр. hub.ntk.novotelecom.ru)
#   HUB_NTK_USERNAME  — логин
#   HUB_NTK_PASSWORD  — пароль / токен
# Образ: ${HUB_NTK_REGISTRY}/tools/vaultls

on:
  push:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Доп. тег образа (напр. v1.0.0)'
        required: false
        default: ''

concurrency:
  group: hub-ntk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to hub.ntk
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HUB_NTK_REGISTRY }}
          username: ${{ secrets.HUB_NTK_USERNAME }}
          password: ${{ secrets.HUB_NTK_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.HUB_NTK_REGISTRY }}/tools/vaultls
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=sha,prefix=,format=short
            type=ref,event=tag
            type=raw,value=${{ github.event.inputs.tag_name }},enable=${{ github.event.inputs.tag_name != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
