server:
  url: https://vaultls.example.com
  client_id: svc_xxxxxxxx
  secret: ${VAULTLS_SECRET}
  insecure_skip_verify: false
schedule: "0 3 1 * *"
jitter: 30m
# Logging. Defaults: level=info, format=text, output=stderr (captured by journald).
# Set file to also keep a log under /var/log; use level=debug for verbose output.
log:
  level: info          # debug|info|warn|error
  format: text         # text|json
  # file: /var/log/vaultls-agent.log
exporter:
  listen: "127.0.0.1:9105"
domains:
  - name: "*.example.com"
    # out_dir must live under /etc/ssl/vaultls (the unit's ReadWritePaths).
    # To write elsewhere, extend ReadWritePaths via a systemd override.
    out_dir: /etc/ssl/vaultls/example.com
    formats: [pem, haproxy]
    owner: root
    group: ssl-cert
    mode: "0640"
    reload: "systemctl reload nginx"
